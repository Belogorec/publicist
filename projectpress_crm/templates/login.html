<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — PUBLICIST CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='crm.css') }}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .login-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
      color: #222;
    }
    .login-subtitle {
      font-size: 14px;
      color: #666;
      text-align: center;
      margin-bottom: 32px;
    }
    .login-step {
      margin-bottom: 24px;
    }
    .step-number {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: #007bff;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-weight: 600;
      font-size: 12px;
      margin-right: 8px;
    }
    .step-title {
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    .step-content {
      margin-left: 32px;
      font-size: 13px;
      line-height: 1.5;
      color: #555;
    }
    .code-box {
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin: 12px 0;
      letter-spacing: 2px;
      word-break: break-all;
    }
    .button-container {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #f5f5f5;
      border-color: #999;
    }
    .btn-primary {
      background: #007bff;
      color: white;
      border-color: #007bff;
    }
    .btn-primary:hover {
      background: #0056b3;
      border-color: #0056b3;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #222;
    }
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.1);
    }
    .form-submit {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .form-submit:hover {
      background: #0056b3;
    }
    .error {
      background: #fee;
      color: #c00;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 16px;
    }
    .success {
      background: #efe;
      color: #080;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-title">PUBLICIST — CRM</div>
    <div class="login-subtitle">Вход через Telegram</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="success">{{ success }}</div>
    {% endif %}

    {% if show_request_code %}
      <!-- Step 1: Request code -->
      <form method="post" action="{{ url_for('request_auth_code') }}">
        <button type="submit" class="form-submit">Получить код для входа</button>
      </form>
    {% elif code %}
      <!-- Step 2: Got code, show to user -->
      <div class="login-step">
        <div class="step-title"><span class="step-number">1</span>Скопируйте код</div>
        <div class="step-content">
          <div class="code-box">{{ code }}</div>
          <div class="button-container">
            <button class="btn btn-primary" onclick="copyCode()">Скопировать</button>
          </div>
        </div>
      </div>

      <div class="login-step">
        <div class="step-title"><span class="step-number">2</span>Отправьте боту</div>
        <div class="step-content">
          Напишите боту команду:
          <div style="margin-top: 8px; font-family: monospace; background: #f8f8f8; padding: 8px; border-radius: 4px;">/auth {{ code }}</div>
          <a href="https://t.me/{{ bot_username }}" target="_blank" class="btn" style="margin-top: 12px; text-align: center; text-decoration: none;">Перейти к боту →</a>
        </div>
      </div>

      <div class="login-step">
        <div class="step-title"><span class="step-number">3</span>Подтвердите вход</div>
        <div class="step-content">
          <form method="post" action="{{ url_for('confirm_auth_code') }}">
            <input type="hidden" name="code" value="{{ code }}">
            <button type="submit" class="form-submit">Проверить и войти</button>
          </form>
          <form method="post" action="{{ url_for('request_auth_code') }}" style="margin-top: 8px;">
            <button type="submit" class="btn" style="width: 100%;">Получить новый код</button>
          </form>
        </div>
      </div>
    {% endif %}
  </div>

  <script>
    function copyCode() {
      const code = "{{ code }}";
      navigator.clipboard.writeText(code).then(() => {
        alert("Код скопирован: " + code);
      });
    }
  </script>
</body>
</html>
